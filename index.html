<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seesaw Simulation</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="app">
        <header class="app-header">
            <h1>Seesaw Simulation</h1>
            <p class="subtitle">
                Click on the beam to drop a random-weight object and watch the balance change.
            </p>
        </header>
        <section class="dashboard">
    
            <div class="info-card">
                <h2>Left Total</h2>
                <p id="left-total">0 kg</p>
            </div>
    
            <div class="info-card">
                <h2>Right Total</h2>
                <p id="right-total">0 kg</p>
            </div>
    
            <div class="info-card">
                <h2>Beam Angle</h2>
                <p id="beam-angle">0°</p>
            </div>
    
            <div class="info-card">
                <h2>Upcoming Weight</h2>
                <p id="upcoming-weight">-</p>
            </div>
    
        </section>
    
        <section class="playground">
            <div class="scene" id="scene">
                <div class="ground-layer"></div>
    
                <div class="beam-hitbox" id="beam-hitbox">
                    <div class="beam" id="beam"></div>
                </div>
    
                <div class="pivot" id="pivot"></div>
    
                <div class="items-layer" id="items-layer"></div>
            </div>
        </section>
    
        <section class="actions">
            <button id="reset-btn" type="button">Reset Simulation</button>
        </section>
    
        <section class="logs">
            <h2>Activity Log</h2>
            <ul id="activity-log"></ul>
        </section>
    
    </main>
    <script src="script.js"></script>
    
</body>
</html>
