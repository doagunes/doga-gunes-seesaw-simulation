<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seesaw Simulation</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="app-header">
        <h1>Seesaw Simulation</h1>
        <p class="subtitle">
            Click on the beam to drop a random-weight object and watch the balance change.
        </p>
    </header>
    <section class="dashboard">

        <div class="info-card">
            <h2>Left Total</h2>
            <p id="left-total">0 kg</p>
        </div>

        <div class="info-card">
            <h2>Right Total</h2>
            <p id="right-total">0 kg</p>
        </div>

        <div class="info-card">
            <h2>Beam Angle</h2>
            <p id="beam-angle">0°</p>
        </div>

        <div class="info-card">
            <h2>Upcoming Weight</h2>
            <p id="upcoming-weight">-</p>
        </div>

    </section>

    
</body>
</html>
